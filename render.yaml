services:
  - type: web
    name: bitcoin-design-interview-voting
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/meta
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_PATH
        value: /opt/render/project/src/voting.db
